##########################################################
#                                                        #
# Configure the parameters for angsd and ngsRelate here! #
#                                                        # 
##########################################################

# ==============================================================================
# PIPELINE OUTPUTS NOTE: 
# These default settings produce BOTH IBS (Identity by State) matrices and 
# IBD (Identity by Descent) results. 
#
# If you ONLY want IBD results (calculated by ngsRelate), you must comment out 
# or remove the 'doIBS' and 'makeMatrix' parameters in the ANGSD section below.
# ==============================================================================


### 1. Input BAM files ###

# Define the path to the BAM files. 
# Example: "data/*.bam" (keep quotes around globs so the shell does not expand them).

bam_dir: "bams/*.bam"


### 2. ANGSD parameters ###

# ==============================================================================
# Define the parameters for ANGSD. Adjust based on your dataset's needs.
# To activate a parameter, simply remove the '# ' at the beginning of the line.
#
# IMPORTANT: Parameters -b (bam filelist) and -out (output prefix) 
# are intentionally omitted here as the Nextflow pipeline sets them automatically.
# ==============================================================================

angsd:
  # --- Performance ---
  nThreads: 4           # [INT] Number of threads to use

  # --- Genotype Likelihoods ---
  GL: 1                 # [INT] GL model: 1=SAMtools, 2=GATK, 3=Beagle
  doGlf: 3              # [INT] Output format: 3=binary format (REQUIRED by ngsRelate)
  
  # --- Allele Frequencies & SNP Calling ---
  doMajorMinor: 1       # [INT] Infer major/minor alleles: 1=from GL, 2=from counts
  doMaf: 1              # [INT] Calculate allele frequencies: 1=known major/minor
  doCounts: 1           # [INT] Count reads (required for doMaf)
  SNP_pval: "1e-6"      # [FLOAT] p-value threshold for keeping a site as a SNP
  minMaf: 0.05          # [FLOAT] Minimum minor allele frequency threshold
  # minInd: 5           # [INT] Min. number of individuals with data to keep a site (adjust to your n)

  # --- Read & Base Quality Filters (QC) ---
  minMapQ: 30           # [INT] Minimum mapping quality (removes poorly aligned reads)
  minQ: 20              # [INT] Minimum base quality (removes bad sequencing calls)
  remove_bads: 1        # [INT] Remove reads flagged as bad (0=no, 1=yes)
  uniqueOnly: 1         # [INT] Use only uniquely mapped reads (0=no, 1=yes)
  only_proper_pairs: 1  # [INT] Use only properly paired reads (0=no, 1=yes)
  # baq: 1              # [INT] Compute Base Alignment Quality (1=normal, 2=extended)
  # C: 50               # [INT] Adjust mapQ for excessive mismatches (recommended 50 for BWA BAMs)
  
  # --- Core Identity Metrics (IBS) ---
  doIBS: 1              # [INT] Calculate Identity-by-State (IBS) 
  makeMatrix: 1         # [INT] Make pairwise IBS distance matrix (.ibsMat)


### 3. ngsRelate parameters ###

# ==============================================================================
# Define the parameters for ngsRelate. Adjust based on your dataset's needs.
# To activate a parameter, simply remove the '# ' at the beginning of the line.
#
# IMPORTANT: Parameters -g (input), -f (freqs), -n (samples), and -O (output) 
# are intentionally omitted here as the Nextflow pipeline sets them automatically.
# ==============================================================================

ngsRelate:
  # --- Core Execution & Performance ---
  p: 4                  # [INT] Threads to use (default: 4)
  # m: 1                # [INT] Model to use: 0=normalEM, 1=acceleratedEM
  # i: 1000             # [INT] Maximum number of EM iterations
  # t: 0.000001         # [FLOAT] Tolerance for breaking EM
  # r: 12345            # [FLOAT] Seed for random number generator
  # v: 1                # [INT] Verbose output (prints info per iteration)

  # --- Analysis Modes ---
  # F: 1                # [INT] Estimate ONLY inbreeding instead of the 9 Jacquard coefficients
  # o: 1                # [INT] Estimate the 3 Jacquard coefficients assuming NO inbreeding
  # c: 1                # [INT] Call genotypes instead of using likelihoods
  # e: 0.01             # [FLOAT] Error rates when calling genotypes (used with -c)
  
  # --- Single-Pair Analysis (Targeting specific individuals) ---
  # a: 0                # [INT] Index of the 1st individual for analysis (zero-based offset)
  # b: 1                # [INT] Index of the 2nd individual for analysis (zero-based offset)
  # B: 100              # [INT] Number of bootstrap replicates (ONLY works for single pairs)
  # N: 10               # [INT] Number of times to start each pair with a random seed

  # --- Data Filtering & Adjustments ---
  # l: 0.05             # [FLOAT] minMaf or 1-Maf filter
  # s: 1                # [INT] Switch the frequency with 1-freq
  # z: "ids.txt"        # [STRING] Name of a file with sample IDs (optional)
  # L: 10000            # [INT] Number of genomic sites (pipeline provides -f, so this is usually not needed)

  # --- Format Specific Parameters ---
  # R: "chr1:1-100"     # [STRING] Region for analysis (only applicable for BCF inputs)
  # T: "PL"             # [STRING] For VCF use PL (default) or GT tag
  # A: "AFngsrelate"    # [STRING] For VCF use allele frequency TAG
  # P: "my_plink"       # [STRING] Name of the binary plink file (excluding the .bed)
